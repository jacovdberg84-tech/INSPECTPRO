<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InspectPro Morning Ops Check</title>
  <link rel="stylesheet" href="./styles.css?v=2" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">✅</div>
      <div>
        <div class="title">Morning Ops Check</div>
        <div class="subtitle">Daily readiness snapshot for solo operations</div>
      </div>
    </div>
    <div class="controls">
      <label>Date
        <input id="opsDate" type="date" />
      </label>
      <button id="runOpsCheckBtn" type="button" class="secondary-btn">Run Check</button>
      <button type="button" class="secondary-btn" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>
  </header>

  <main class="page">
    <section class="panel">
      <div class="panel-header">
        <h2>Overall Status</h2>
      </div>
      <div id="opsOverall" class="history-empty">Waiting for check...</div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>System Checks</h2>
      </div>
      <div id="opsChecks" class="summary-grid"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Quick Notes</h2>
      </div>
      <div id="opsNotes"></div>
    </section>
  </main>

  <script src="./ops.js?v=1"></script>
</body>
</html>
